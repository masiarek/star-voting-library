# expect: invalid: Blake=x
# NEGATIVE — wrong character in an Approval ballot.
# A cell contains the letter 'x' (not 0, 1, blank, or a marker).
# Original intent (BV15_neg2): race_abstention_allowed: false with "~" in ballots.
#   The current engine has no abstention on/off toggle (abstentions are always
#   allowed), so that case is no longer an error — repurposed to a wrong-character
#   negative, which the engine DOES catch.
# Current engine error: "Approval ballots may only use scores {0, 1}" + "(invalid: Blake=x)".
election_title: Basic — Approval with an invalid character
voting_method: Approval
num_winners: 1
ballots: |-
  Andre,Blake
  0,1
  0,x

