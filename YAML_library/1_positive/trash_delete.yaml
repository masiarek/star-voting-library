election_title: 'BV130 — 6 candidates / 3 winners, Bloc STAR'

scenario_description: |-
  BV130 shape — 6 candidates / 3 winners, Bloc STAR, tuned into a clean
  dead-rung teaching case (no candidate scores a 5 anywhere — the whole
  election is capped at 4).

  Seat 1 is a perfect Ada/Dan tie that survives EVERY deterministic rung:
  both total 15, pairwise 1-1 (2 Equal Support), and — because the ceiling
  is 4 — five-star is 0-0 (the dead rung). The pre-published lot [Ada, ...]
  breaks it in Ada's favor, and the engine flags it. Seats 2 and 3 then
  resolve cleanly on the ballots (Dan, then Eve), so one lot-decided seat
  sits beside two ballot-decided seats. Ben, Cara, Finn are genuine
  also-rans (present, never advancing).

