# file: bettervoting_tabulation_engine.yaml
#
# Technical description of the BetterVoting (BV) tabulation engine, reverse-engineered
# from the source of Equal-Vote/bettervoting (clone: /Volumes/T7/Voting/BetterVoting/BV/bettervoting).
# All file paths below are relative to that repo root. This document is descriptive
# metadata for the YAML library — it is NOT executed.

engine:
  name: BetterVoting tabulation engine
  project: Equal-Vote/bettervoting
  repo: https://github.com/Equal-Vote/bettervoting
  live_site: https://bettervoting.com
  language: TypeScript
  location_in_repo: packages/backend/src/Tabulators/
  runs_on: backend (Node/Express) — tabulation is server-side, not in the browser
  exact_math: fraction.js (rational arithmetic) is used wherever surplus/weight transfer
              or averaging could accumulate floating-point error (IRV, STV, STAR_PR).
  described_from_commit_date: 2026-07-02   # mtime of the working tree when documented
  documented_on: 2026-07-05

# ---------------------------------------------------------------------------
# 1. Where the engine sits in the overall system
# ---------------------------------------------------------------------------
architecture:
  monorepo: TypeScript workspace with three packages under packages/
  packages:
    shared:
      path: packages/shared/
      package_name: "@equal-vote/star-vote-shared"
      role: >
        Common domain types shared by backend and frontend. The tabulation type
        contract lives here, so the engine's inputs/outputs are the same objects
        the UI renders.
      key_files:
        - src/domain_model/ITabulators.ts   # rawVote, vote, candidate, *Results, *SummaryData, tieBreakType
        - src/domain_model/ElectionSettings.ts
        - src/domain_model/Ballot.ts
        - src/domain_model/Candidate.ts
    backend:
      path: packages/backend/
      package_name: "@equal-vote/star-vote-backend"
      framework: Express (port 5000 / BACKEND_PORT)
      role: Hosts the tabulators and the HTTP endpoints that invoke them.
      key_files:
        - src/Tabulators/                                  # the engine itself
        - src/Controllers/Election/getElectionResultsController.ts  # production entry point
        - src/Controllers/Election/sandboxController.ts    # ad-hoc "try it" entry point
        - src/Routes/elections.routes.ts                   # GET /ElectionResult/:id wiring
        - src/Models/                                      # Kysely DB access (ballots, elections)
    frontend:
      path: packages/frontend/
      package_name: "@equal-vote/star-vote-frontend"
      framework: React 17 + Material-UI, bundled with RSBuild
      role: >
        Consumes the JSON results object and renders method-specific result views.
        It does no tabulation; it visualizes roundResults, summaryData and logs.
      key_files:
        - src/components/Election/Results/Results.tsx
        - src/components/Election/Results/STAR/          # STARResultSummaryWidget, DetailedSteps, etc.
        - src/components/Election/Results/IRV/
        - src/components/RaceContextProvider.tsx

# ---------------------------------------------------------------------------
# 2. Data flow: ballots -> results
# ---------------------------------------------------------------------------
data_flow:
  entry_point: packages/backend/src/Controllers/Election/getElectionResultsController.ts
  http_route: "GET /API/ElectionResult/:id  (elections.routes.ts -> getElectionResults)"
  steps:
    - step: 1
      what: Authorize
      detail: >
        If settings.public_results is false, an open election throws Forbidden;
        otherwise the caller must hold permission canViewPreliminaryResults.
    - step: 2
      what: Load ballots
      detail: BallotModel.getBallotsByElectionID(electionId) pulls all ballots for the election.
    - step: 3
      what: Build candidate list per race
      detail: >
        race.candidates -> candidate[] (id, name, tieBreakOrder=-1, empty votesPreferredOver
        and winsAgainst maps). Approved write-in candidates are appended, with ids from
        makeWriteInCandidateId(name).
    - step: 4
      what: Build the Cast Vote Record (CVR)
      detail: >
        For each ballot, the vote matching race_id is turned into a rawVote whose `marks`
        map candidate_id -> score/rank. Duplicate scores for one candidate keep the first
        and warn. Write-in scores are matched to approved candidates by alias
        (trimLower); unmatched/unapproved write-ins are counted as disregarded.
        overvote_rank and has_duplicate_rank are carried onto the rawVote.
    - step: 5
      what: Deterministic tie-break shuffle
      detail: >
        shuffleCandidatesForRandomTiebreak(election.create_date, candidates, cvr.length,
        race.race_id) assigns each candidate a tieBreakOrder BEFORE tabulation, so any
        random tie-break is reproducible. `perm` (the resulting candidate id order) is
        returned with the results.
    - step: 6
      what: Tabulate
      detail: "VotingMethods[voting_method](candidates, cvr, num_winners, election.settings)"
    - step: 7
      what: Post-process + respond
      detail: >
        roundResults logs whose key contains 'random' are augmented with
        tiebreak_candidate_names; writeInDiagnostics is attached; the controller responds
        with { election, results: ElectionResults[] } (one entry per race).
  sandbox_path: >
    packages/backend/src/Controllers/Election/sandboxController.ts calls the same
    VotingMethods map for the /sandbox feature (no persistence, no auth gating).

# ---------------------------------------------------------------------------
# 3. The dispatch table
# ---------------------------------------------------------------------------
method_dispatch:
  file: packages/backend/src/Tabulators/VotingMethodSelecter.ts
  export: VotingMethods
  signature: >
    (candidates: candidate[], votes: rawVote[], nWinners?: number,
     electionSettings?: ElectionSettings) => ResultsType
  map:
    STAR: Star            # Star.ts
    Approval: Approval    # Approval.ts
    STAR_PR: AllocatedScore  # AllocatedScore.ts (proportional STAR / Allocated Score)
    Plurality: Plurality  # Plurality.ts
    IRV: IRV              # IRV.ts (IRV_STV with proportional=false)
    STV: STV              # IRV.ts (IRV_STV with proportional=true)
    RankedRobin: RankedRobin  # RankedRobin.ts

# ---------------------------------------------------------------------------
# 4. Shared type contract (ITabulators.ts)
# ---------------------------------------------------------------------------
type_contract:
  file: packages/shared/src/domain_model/ITabulators.ts
  inputs:
    rawVote:
      marks: "keyedObject<number|null>  # candidate id -> bubble value (score or rank)"
      overvote_rank: "number? (rank at which the ballot overvoted, for ranked methods)"
      has_duplicate_rank: "boolean?"
    vote: "like rawVote but marks are non-null (post-filter tally ballot)"
    candidate:
      id: string
      name: string
      tieBreakOrder: "number  # assigned by the deterministic shuffle"
      votesPreferredOver: "keyedObject<number>  # pairwise: #ballots preferring this over X"
      winsAgainst: "keyedObject<boolean>  # pairwise majority result vs X"
  outputs:
    genericResults:
      votingMethod: votingMethod
      elected: "CandidateType[]"
      tied: "candidate[]"
      other: "candidate[]  # non-elected, in sorted order"
      roundResults: "roundResults[]  # per elimination/selection round"
      summaryData: SummaryType
      tieBreakType: tieBreakType
    roundResults:
      winners: "CandidateType[]"
      runner_up: "CandidateType[]"
      tied: "CandidateType[]"
      tieBreakType: tieBreakType
      logs: "tabulatorLog[]  # i18n key objects or plain strings, drive the UI explanation"
    genericSummaryData:
      candidates: "CandidateType[]"
      nOutOfBoundsVotes: number
      nAbstentions: number
      nTallyVotes: "number  # nVotes = nOutOfBoundsVotes + nAbstentions + nTallyVotes"
  tieBreakType_enum: [none, score, head_to_head, five_star, random]
  ElectionResults_union: [starResults, allocatedScoreResults, approvalResults, rankedRobinResults, irvResults, pluralityResults]

# ---------------------------------------------------------------------------
# 5. Shared engine core (Util.ts) — the heart most methods build on
# ---------------------------------------------------------------------------
core_util:
  file: packages/backend/src/Tabulators/Util.ts
  getSummaryData:
    purpose: >
      Turns raw ballots + candidates into tally votes and a fully-populated summary,
      computing all the cross-candidate matrices the methods rely on.
    produces:
      - "Filters invalid ballots via stat tests, yielding nOutOfBoundsVotes / nAbstentions / nTallyVotes."
      - "votesPreferredOver[a][b]: count of tally ballots preferring a over b."
      - "winsAgainst[a][b]: true if a beats b head-to-head (pairwise majority)."
      - "score: sum of marks per candidate (when candidate has a `score` field)."
      - "copelandScore: pairwise wins (win=+1, tie=+0.5) — used by Ranked Robin."
      - "fiveStarCount: number of 5-star marks — used by STAR tie-breaks."
      - "Pre-sorts candidates by the method's sort field."
    method_type_switch:
      cardinal: "a preferred over b when marks[a] > marks[b] (STAR, Approval, Plurality, STAR_PR)."
      ordinal: "a preferred over b when rank[a] < rank[b], with 0 remapped to Infinity (IRV, STV, Ranked Robin)."
  validity_filters:
    makeBoundsTest: "flags ballots with any mark outside [min,max] -> nOutOfBoundsVotes."
    makeAbstentionTest: >
      flags ballots that are all-equal (or all-zero) as abstentions -> nAbstentions.
      STAR/STAR_PR pass markAllEqualAsAbstention=true.
  sortCandidates:
    purpose: generic, stable, multi-field candidate sort.
    notes:
      - "Always appends tieBreakOrder as the final key (inverted: lower order = better)."
      - "Supports array-valued fields (e.g. hareScores) and comparison by round of victory."
      - "Uses fraction.js so rational fields compare exactly."
  runBlocTabulator:
    purpose: >
      Generic driver for bloc / sequential multi-winner elections used by STAR, Approval,
      Plurality and Ranked Robin.
    behavior:
      - "Repeatedly calls the method's singleWinner callback, pushes winners to elected."
      - "Removes each winner before the next round; records roundResults."
      - "Only records final tieBreakType/tied on the last round."
      - "Optional evaluate() produces the final full candidate ordering for display."

# ---------------------------------------------------------------------------
# 6. Per-method algorithms
# ---------------------------------------------------------------------------
methods:
  STAR:
    file: packages/backend/src/Tabulators/Star.ts
    full_name: Score Then Automatic Runoff
    ballot: score 0-5 (cardinal, bounds 0..5)
    algorithm:
      scoring_round: >
        Pick the two highest total-score finalists. If 2nd and 3rd are tied on score,
        resolve with the tie-break cascade below.
      automatic_runoff: >
        Between the two finalists, the pairwise (head-to-head) preference winner wins
        (winsAgainst / votesPreferredOver).
    finalist_tiebreak_cascade: [score, head_to_head, five_star, random]
    runoff_tiebreak_cascade: [score, five_star, random]
    setTieBreak: >
      Escalates the reported tieBreakType to the most 'extreme' protocol reached, by
      priority order [none, score, head_to_head, five_star, random].
    multi_winner: bloc via runBlocTabulator (repeated single-winner STAR).
    logs: rich i18n keys (tabulation_logs.star.*) drive the step-by-step UI explanation.
  STAR_PR:
    file: packages/backend/src/Tabulators/AllocatedScore.ts
    full_name: Proportional STAR / Allocated Score
    ballot: score 0-5 (cardinal), scores normalized by MAX_SCORE=5.
    algorithm: >
      Hare-style quota = V / nWinners. Each round elects the highest weighted-score
      candidate, then allocates/spends the ballots that supported the winner up to the
      quota (splitPoints / spentAboves / weight_on_splits tracked in summaryData), so
      remaining ballots retain proportional weight. Continues past filled seats to fix
      full candidate ordering. Uses fraction.js for exact weight math.
    default_winners: 3
  Approval:
    file: packages/backend/src/Tabulators/Approval.ts
    ballot: approve/no (cardinal, bounds 0..1).
    algorithm: most approvals wins each round (bloc for multi-winner).
    tiebreak: random only.
  Plurality:
    file: packages/backend/src/Tabulators/Plurality.ts
    ballot: choose-one (bounds 0..1; tabulated with cardinal rules for score totals).
    extra_stat: nOvervotes (ballots marking more than one candidate).
    algorithm: most votes wins each round (bloc for multi-winner).
    tiebreak: random only.
  RankedRobin:
    file: packages/backend/src/Tabulators/RankedRobin.ts
    ballot: ranked (ordinal).
    algorithm: >
      Highest Copeland score (pairwise round-robin: win=+1, tie=+0.5) wins. A pure
      2-way tie is broken head-to-head; anything else falls to random (a more robust
      tiebreaker is noted as not-yet-implemented in the code).
  IRV:
    file: packages/backend/src/Tabulators/IRV.ts  # IRV_STV(..., proportional=false)
    ballot: ranked (ordinal).
    quota: floor(nActiveVotes / 2 + 1), recomputed on active (non-exhausted) votes each round.
    algorithm: >
      Round-by-round: tally each candidate's current first-choice weight (hareScores),
      elect if the top meets quota, else eliminate the lowest and redistribute their
      ballots to the next non-eliminated choice.
    exhaustion:
      tracked: [nExhaustedViaOvervote, nExhaustedViaSkippedRank, nExhaustedViaDuplicateRank]
      skipped_rank_rule: exhaust_on_N_repeated_skipped_marks (from ElectionSettings)
      overvote_rule: ballot exhausts when its top remaining rank equals overvote_rank.
  STV:
    file: packages/backend/src/Tabulators/IRV.ts  # IRV_STV(..., proportional=true)
    ballot: ranked (ordinal).
    quota: floor(nVotes / (nWinners + 1) + 1)   # Droop-style
    surplus_transfer: >
      On election, surplus fraction = (maxVotes - quota) / maxVotes; each of the winner's
      ballots is down-weighted by that fraction (fraction.js, floored to 5 dp) and
      redistributed. If remaining candidates can fill all remaining seats, they are all
      elected.

# ---------------------------------------------------------------------------
# 7. Deterministic random tie-break (relevant to open issue #1417)
# ---------------------------------------------------------------------------
random_tiebreak:
  files:
    - packages/backend/src/Tabulators/shuffleCandidatesForRandomTiebreak.ts
    - packages/backend/src/Tabulators/tinyrand.ts
  design_goal: >
    "Random" tie-breaks must be REPRODUCIBLE: re-running the tabulator on the same data
    must yield the same winner. Achieved by seeding a deterministic PRNG and shuffling
    candidates once, up front, into a fixed tieBreakOrder.
  seed:
    formula: "seed = (rawVoteCount + hashStringToInt(raceId)) >>> 0   # unsigned 32-bit"
    components:
      raw_votes: >
        Number of raw ballots (not tally votes) — makes the tie-break order change as new
        votes arrive.
      race_offset: >
        hash of raceId — so multiple races with identical candidates (common in
        multi-method polls) don't all break ties the same way.
  prng:
    library: TinyRand (tim-one/tinyrand), copied verbatim into tinyrand.ts
    why: small, language-agnostic, so results are reproducible in any language.
    version: 0
  reserved:
    electionCreateDate: >
      Currently passed in but unused; reserved so that if the shuffle approach ever
      changes, old elections can keep their original ordering (versioning by date).
  known_issue: >
    Because the seed depends on rawVoteCount, the tie-break lot order shifts every time a
    new ballot is cast, so the "random" winner of a tie is not fixed until polls close.
    Issue #1417 (author masiarek) proposes deterministic PRE-PUBLISHED lot numbers instead.

# ---------------------------------------------------------------------------
# 8. Testing
# ---------------------------------------------------------------------------
testing:
  unit_tests: "Jest — one *.test.ts per tabulator under packages/backend/src/Tabulators/"
  files:
    - Star.test.ts
    - AllocatedScore.test.ts
    - Approval.test.ts
    - Plurality.test.ts
    - RankedRobin.test.ts
    - IRV.test.ts
    - STV.test.ts
    - shuffleCandidatesForRandomTiebreak.test.ts
  run: "npm test -w @equal-vote/star-vote-backend"
  repo_fixture: tabulator_test_cases.yaml (at repo root)

# ---------------------------------------------------------------------------
# 9. Notable engineering details
# ---------------------------------------------------------------------------
notes:
  - "Exact arithmetic: IRV/STV/STAR_PR use fraction.js to avoid float drift in vote transfers."
  - "The engine is pure/stateless: each VotingMethods[...] call takes candidates+votes and returns a results object; no DB or IO inside the tabulators."
  - "Results are self-explaining: every round carries `logs` (i18n keys), which the React results views render as the human-readable count narrative."
  - "Write-ins are resolved to candidates by alias before tabulation, in the controller, not the engine."
  - "Same engine powers both real elections (getElectionResultsController) and the sandbox (sandboxController)."
