election_title: "BV1570 — undecided plurality election still declares a winner"
election_description: |-
  Live on BetterVoting: https://bettervoting.com/6hv7jf ·
  results: https://bettervoting.com/6hv7jf/results
  Every ballot is effectively empty, yet a winner (and a wrong voter count) is shown.

bv_test_id: BV1570
bv_election_id: 6hv7jf
bv_results_url: https://bettervoting.com/6hv7jf/results
bv_github_issue: https://github.com/Equal-Vote/bettervoting/issues/894

scenario_description: |-
  A Plurality ("choose one") race, two options, three voters, all "undecided":
  one ballot deselects Approve (a `0`, then blank), one is fully blank, one
  deselects Reject. Markers: `&` = the BetterVoting `null` (left blank).

  **BetterVoting** counts all three as abstentions (nTallyVotes = 0), reports the
  wrong voter count (the results view showed 2, not 3), and still declares a winner
  (Approve) off zero tallied votes (bettervoting#894).

  **LH diverges:** only the fully-blank ballot abstains. The two ballots that carry
  an explicit `0` are real tally votes (both options score 0), so LH sees
  nTallyVotes = 2, nAbstentions = 1, a 0-0 tie, resolved to Approve by lot. Same
  winner, different count — LH counts an explicit 0 as a cast vote, per the #884
  dispute.

num_winners: 1
voting_method: Plurality

options:
  show_description: false
  show_matrix: false
  show_condorcet: false
  show_score_counts: false
  show_irv: false
  brief: true
  collapse_ballots: false
  count_separator: "×"

# Approve, Reject.  `&` = candidate abstention (BV null / left blank).
ballots: |-
  Approve,Reject
  0,&
  &,&
  &,0

# 0-0 tie resolved to Approve by lot / CSV column order.
expected_winners:
  - Approve

