  5,4,0,0
  5,4,0,0
  5,4,0,0
  5,4,0,0
  5,4,0,0
  0,0,5,4 # 4 south-side voters: Cleo first, Dane close behind
  0,0,5,4
  0,0,5,4
  0,0,5,4
expected_winners:
  - Asa
  - Cleo

