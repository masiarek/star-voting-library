election_title: Vote splitting — scenario 1 of 3 — the spoiler strikes
scenario_description: |-
  A bloc that is a MAJORITY can still LOSE under Choose-One when it splits.

  90 voters. 55 are chocolate lovers (a 61% majority), but they split across two
  chocolates — 30 for DarkChoco, 25 for MilkChoco. The other 35 prefer Vanilla.

  Choose-One first choices: Vanilla 35, DarkChoco 30, MilkChoco 25. Vanilla wins
  with 38.9% even though 61% wanted chocolate — that is the spoiler effect.

  STAR lets chocolate lovers score BOTH chocolates, so the bloc is not split and
  DarkChoco wins. Watch the [Vote-splitting check] confirm it.

blocs:
  Chocolate: [DarkChoco, MilkChoco]

options:
  show_description: false   # show the scenario context on screen (study/reference)
  show_matrix: true   # show the Runoff (Preference) Matrix
  matrix_finalists_only: true   # true = finalists only; false = full N×N grid (needs show_matrix)
  show_condorcet: false   # show the [Condorcet Winner] line
  show_score_counts: false   # show the per-candidate [Score Distribution] table
  show_irv: false   # show the [Divergence from STAR] RCV-IRV comparison
  brief: true   # true = collapse repetitive "[STAR Voting: ...]" headers
  collapse_ballots: true   # true = group identical ballots as "count <sep> scores"
  count_separator: "×"   # collapsed-count separator: ×, :, or x/X

voting_method: STAR
num_winners: 1

ballots: |-
  Count:DarkChoco,MilkChoco,Vanilla
  30:5,4,0   # love dark, like milk, no vanilla
  25:4,5,0   # love milk, like dark, no vanilla
  35:2,1,5   # love vanilla, mild on chocolate

expected_winners:
  - DarkChoco

