election_title: "Voting styles — a valid STAR bullet vote (3 candidates)"

scenario_description: |-
  Three legal STAR ballot styles on one ballot set: a full/expressive ballot
  using the whole 0-5 range, a ballot with equal scores, and a bullet vote
  (only one candidate scored). All are valid; bullet voting is allowed but not
  recommended — if your one pick doesn't reach the runoff, your ballot has no
  say in the final head-to-head, so you forfeit influence. Vanilla wins here
  either way.
# Voting styles — what a valid STAR ballot may look like.
# STAR lets you score each candidate 0–5 independently, so several styles are
# all legal on the same ballot set.


# Presenter notes (ignored by the engine; not shown to the audience).
video_script: |-
  SAY: "There's no single 'right' way to fill out a STAR ballot. Here are three
       legal styles on one ballot set: a full ballot using the whole range, a
       ballot with equal scores, and a 'bullet vote' that scores only one."
  HOW: Walk down the three ballots, naming each style.
  WHY: Address the most common voter anxiety - 'am I doing this right?' - and
       introduce 'bullet voting' so you can warn against it.
  POINT OUT: Bullet voting is legal but weak: if your one pick doesn't reach the
       runoff, your ballot has no say in the final head-to-head.
  TRANSITION: "Bullet voting under-uses the ballot. Next: what about the opposite
       worry - what if you dislike everyone?"

options:
  show_description: false   # clean demo: description stays in the file (+_tabulated), hidden on screen
  show_matrix: true   # show the Runoff (Preference) Matrix
  matrix_finalists_only: true   # true = finalists only; false = full N×N grid (needs show_matrix)
  show_condorcet: false   # show the [Condorcet Winner] line
  show_score_counts: false   # show the per-candidate [Score Distribution] table
  show_irv: false   # show the [Divergence from STAR] RCV-IRV comparison
  brief: true   # true = collapse repetitive "[STAR Voting: ...]" headers
  collapse_ballots: true   # true = group identical ballots as "count <sep> scores"
  count_separator: "×"   # collapsed-count separator: ×, :, or x/X

voting_method: STAR   # STAR Voting — single-winner
num_winners: 1

ballots: |-
  Choco,Almond,Vanilla
      1,     2,      5   # full/expressive style
      0,     5,      5   # equal scores are OK
      0,     0,      5   # bullet voting

expected_winners:
  - Vanilla

