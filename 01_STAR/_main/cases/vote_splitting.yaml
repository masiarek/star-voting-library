election_title: Vote splitting — two chocolates split the majority
scenario_description: |-
  Election: pick ONE dessert for the party. 36 voters.

  Twenty-two of the thirty-six are chocolate lovers — a clear 61% majority. But
  there are TWO chocolates on the menu, DarkChoco and MilkChoco, and only
  fourteen voters prefer Vanilla.

  Under Choose-One Plurality each voter may name only one flavor, so the
  chocolate majority splits its vote — 12 for DarkChoco, 10 for MilkChoco — and
  Vanilla wins with just 14 of 36 (38.9%), a dessert a 61% majority actively
  dislikes. That is vote splitting / the spoiler effect.

  STAR fixes it without asking chocolate to drop a flavor: every voter scores
  all three 0–5, so a chocolate lover can give BOTH chocolates a high score
  instead of choosing between them. The two highest totals advance to an
  automatic runoff, and the winner has majority support head-to-head.

# Presenter notes (ignored by the engine; not shown to the audience).
video_script: |-
  SAY: "Twenty-two of our thirty-six voters love chocolate — a clear majority.
       But there are two chocolates on the menu, DarkChoco and MilkChoco, and
       under today's Choose-One rules each fan can pick only one. So the chocolate
       vote splits, twelve to ten — and Vanilla wins with fourteen votes, a
       dessert a sixty-one percent majority didn't even want."
  HOW: Show the Choose-One tally FIRST (Vanilla 14, DarkChoco 12, MilkChoco 10)
       and let the wrong winner sting for a beat before STAR appears. Then reveal
       the same thirty-six ballots as 0–5 scores.
  WHY: This is the payoff scenario — the entire case for STAR in one race. Hold
       the candidates at three so the ONLY things that change are the ballot and
       the count, not the field.
  TRANSITION: "Now watch the SAME thirty-six voters fill out a STAR ballot —
       giving both chocolates a score instead of choosing between them — and see
       who actually wins."

voting_method: STAR   # STAR Voting - Single-winner
num_winners: 1

options:
  show_description: false   # clean demo: description stays in the file (+_tabulated), hidden on screen
  # Layer 1 (general audience): keep the render clean. The matrix and the
  # Condorcet line are the Layer 2 deep-dive — flip either to true to discuss
  # the head-to-head winner with a more advanced audience from this SAME file.
  show_matrix: true
  show_condorcet: false
  show_score_counts: false   # the per-flavor score distribution reads well on screen
  brief: true   # collapse repetitive "[STAR Voting: ...]" headers
  collapse_ballots: true   # group identical ballots as "count × scores"
  count_separator: "×"
  matrix_finalists_only: true   # true = finalists only; false = full N×N grid (needs show_matrix)
  show_irv: false   # show the [Divergence from STAR] RCV-IRV comparison

ballots: |-
  Count:DarkChoco,MilkChoco,Vanilla
  12:5,4,0   # love dark, like milk, no vanilla
  10:4,5,0   # love milk, like dark, no vanilla
  14:2,1,5   # love vanilla, mild on chocolate

expected_winners:
  - DarkChoco

# file: vote_splitting.yaml
