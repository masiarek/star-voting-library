election_title: Unanimous ballots (five candidates)
scenario_description: |-
  Every voter casts an identical ballot, so the outcome is unanimous and the
  finalists are never in doubt. A simple sanity check / smallest-contrast case
  for the five-candidate display.

options:
  show_description: false   # clean demo: description stays in the file (+_tabulated), hidden on screen
  show_matrix: true
  matrix_finalists_only: true
  show_condorcet: false
  show_score_counts: false
  show_irv: false   # show the [Divergence from STAR] RCV-IRV comparison
  brief: true   # true = collapse repetitive "[STAR Voting: ...]" headers
  collapse_ballots: true   # true = group identical ballots as "count <sep> scores"
  count_separator: "×"   # collapsed-count separator: ×, :, or x/X

num_winners: 1
voting_method: STAR
ballots: |-
  Andre,Blake,Carmen,David,Ella
      5,    1,     4,    3,   0
      5,    1,     4,    3,   0
      5,    1,     4,    3,   0

expected_winners:
  - Andre

# file: 05a_c5_b3_unanimous-ballots.yaml
