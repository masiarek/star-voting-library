# Continuation of the previous lesson (03b low-score ballots).
# Same voters, same preferences - but each "least-bad" score is raised from 1 to 2.

election_title: Voting styles — low-score ballots (continued)
scenario_description: |-
  Follow-up to the previous example. The voters and their preferences are
  unchanged; we only raised each "least-bad" score from 1 to 2.

  The winner is still Almond. That is the point: STAR decides this election by
  the RELATIVE ordering on each ballot (and which candidate more voters prefer),
  not by the absolute number. Scaling everyone's scores up the same way doesn't
  change the result.

  (Where higher scores DO matter is when voters differ - giving a candidate a 2
  instead of a 1 adds more weight in the score round relative to other voters'
  ballots.)

# Presenter notes (ignored by the engine; not shown to the audience).
video_script: |-
  SAY: "Same voters, same preferences - I just changed every 1 to a 2. Does the
       winner change? No - still Almond. STAR cares about the RELATIVE ordering,
       not the absolute number."
  HOW: Run it right after the previous file so the audience sees identical
       results. The non-change IS the lesson.
  WHY: Dispel the idea that bigger numbers = a different outcome when everyone
       scales the same way. Sets up the nuance that differences BETWEEN voters
       are what carry weight.
  TRANSITION: "So scores are relative. Next, let's turn on STAR's analysis views
       - the preference matrix and the Condorcet check - to see the head-to-head
       under the hood."

options:
  show_description: false   # clean demo: description stays in the file (+_tabulated), hidden on screen
  show_matrix: true   # show the Runoff (Preference) Matrix
  matrix_finalists_only: true   # true = finalists only; false = full N×N grid (needs show_matrix)
  show_condorcet: false   # show the [Condorcet Winner] line
  show_score_counts: false   # show the per-candidate [Score Distribution] table
  show_irv: false   # show the [Divergence from STAR] RCV-IRV comparison
  brief: true   # true = collapse repetitive "[STAR Voting: ...]" headers
  collapse_ballots: true   # true = group identical ballots as "count <sep> scores"
  count_separator: "×"   # collapsed-count separator: ×, :, or x/X

voting_method: STAR   # STAR Voting - Single-winner

num_winners: 1
ballots: |-
  Choco,Almond,Vanilla
      0,     2,      0   # least-bad = Almond
      0,     0,      2   # least-bad = Vanilla
      0,     2,      0   # least-bad = Almond

expected_winners:
  - Almond

