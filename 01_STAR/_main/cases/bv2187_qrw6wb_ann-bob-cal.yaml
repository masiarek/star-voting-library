election_title: Ann, Bob, Cal - the canonical leading example (single-winner STAR)

bv_test_id: BV2187
bv_election_id: qrw6wb
bv_results_url: https://bettervoting.com/qrw6wb/results

scenario_description: |-
  THE repo's leading example - the exact election shown in the root README, the
  YAML authoring template, and "Why YAML test cases". One file, three voters,
  three candidates: the smallest STAR election where both rounds do visible,
  different work. If a page needs "a STAR election" and nothing scenario-specific,
  it should show THIS one (see 00_start_here/tips/TIPS_canonical_elections.md).

  Live results: https://bettervoting.com/qrw6wb/results (BetterVoting election
  qrw6wb, Test ID BV2187; write-ins disabled - the candidate list is locked).

  What each ballot teaches:
  - Voter 1 (5,4,0): likes BOTH Ann (5) and Bob (4) - no vote-splitting fear.
    In the runoff her ballot is one full vote for Ann (5 > 4): a near-tie in
    scores is still a whole vote in the runoff.
  - Voter 2 (3,5,2): a Bob fan who honestly scores the others too.
  - Voter 3 (0,3,5): loves Cal, rates Bob a lukewarm 3 - and that honest 3 is
    exactly what makes Bob everyone's acceptable choice.

  The count: Scoring Round totals Bob 12, Ann 8, Cal 7 -> finalists Bob & Ann.
  Automatic Runoff: Bob is preferred on 2 ballots, Ann on 1 -> Bob wins 2-1.
  Bob leads the scores AND wins the runoff - deliberately no twist, so the
  PROCEDURE is the whole lesson. (Bob is also the Condorcet winner.)

  CANONICAL = FROZEN: never edit these ballots. A lesson needing different
  ballots gets a new scenario with a new cast of names.

# Presenter notes (ignored by the engine; not shown to the audience).
video_script: |-
  SAY: "Three voters, three candidates - small enough to count in your head.
       Add the stars: Bob 12, Ann 8, Cal 7. Bob and Ann are the finalists.
       Now each ballot becomes one vote for the finalist it scored higher:
       Ann gets voter 1 (5 beats 4), Bob gets voters 2 and 3. Bob wins 2 to 1."
  HOW: Walk voter 1's ballot slowly - she scored Bob a friendly 4, yet her
       runoff vote goes to Ann. Scores pick the finalists; preferences pick
       the winner.
  WHY: This is the mechanics demo, not a persuasion demo - nothing surprising
       happens on purpose. Save the "winner flips" drama for the lunch vote
       and the runoff-reversal cases.

options:
  show_description: false   # clean demo: description stays in the file (+_tabulated), hidden on screen
  show_matrix: true   # show the Runoff (Preference) Matrix
  matrix_finalists_only: true   # true = finalists only; false = full N×N grid (needs show_matrix)
  show_condorcet: false   # show the [Condorcet Winner] line
  show_score_counts: false   # show the per-candidate [Score Distribution] table
  show_irv: false   # show the [Divergence from STAR] RCV-IRV comparison
  show_runoff_percent: true   # the self-reconciling two-line runoff summary
  brief: true   # true = collapse repetitive "[STAR Voting: ...]" headers
  collapse_ballots: false   # each ballot is a distinct teaching case - one row per voter
  count_separator: "×"   # collapsed-count separator: ×, :, or x/X

voting_method: STAR   # STAR Voting - Single-winner
num_winners: 1
ballots: |-
  Ann,Bob,Cal
  5,4,0
  3,5,2
  0,3,5

expected_winners:
  - Bob

