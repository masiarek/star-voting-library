election_title: 'Three-way dead-rung tie — published order B,C,A elects B'

scenario_description: |-
  The SAME rotationally-symmetric three-candidate dead-rung tie as
  three_way_dead_rung_A.yaml (A 4/0/0, B 0/4/0, C 0/0/4 — totals 4-4-4, all
  pairwise 1-1, no 5s so the five-star rung is dead). Only the lot order changes:
  here it is [B, C, A], so B wins. Same ballots as _A (which elects A) and _C
  (which elects C) — the winner is entirely a function of the lot order, which
  under a random tie-break is a 1-in-3 draw. See the lesson md.

options:
  show_description: false
  show_matrix: false
  show_condorcet: false
  show_score_counts: true
  show_irv: false
  show_runoff_percent: true
  brief: true
  collapse_ballots: false
  count_separator: "×"

num_winners: 1
voting_method: STAR
lot_numbers: [B, C, A]
ballots: |-
  A,B,C
  4,0,0
  0,4,0
  0,0,4

expected_winners:
  - B

