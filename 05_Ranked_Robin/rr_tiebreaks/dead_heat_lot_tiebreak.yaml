election_title: "Ranked Robin — a dead heat that runs the whole tiebreak ladder (LH-only)"
election_description: >-
  4 score ballots, 3 candidates. Ada and Ben are a perfect head-to-head TIE: two
  voters score them EQUAL (Equal Support — no preference), the other two split one
  each, so the matchup is 1-1. Both beat Cara outright. So Ada and Ben each go
  1-0-1 (Copeland 1.5) AND their total margins are identical (+4). Ranked Robin
  walks the FULL tiebreak ladder — most wins (tie) -> total margin (tie) -> lot
  order — and only the pre-published lot [Ada, Ben, Cara] settles it, in Ada's
  favor. Showcases the Equal Support column and the +1/2 Copeland credit that no
  other case in the set exercises.

  LH-ONLY ON PURPOSE. This case is exactly where the LH and BetterVoting tiebreak
  rules DIVERGE. LH: most wins -> margin -> lot (fully deterministic). BetterVoting
  RankedRobin.ts: most wins -> head-to-head (2-way only) -> RANDOM. Here the two
  leaders tie each other head-to-head too, so BV would fall through to a random
  pick — un-freezable — which is why there is no BV election for this case. See
  00_start_here/RCV_Ranked_Robin/rr_tiebreak_lh_vs_bv.md.

voting_method: RankedRobin
num_winners: 1
lot_numbers: [Ada, Ben, Cara]
options:
  show_matrix: true
ballots: |-
  Ada,Ben,Cara
  5,5,0
  5,5,0
  4,3,1
  3,4,1

expected_winners:
  - Ada

