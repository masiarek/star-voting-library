election_title: "Ranked Robin (RCV-RR) — the consensus center wins the round-robin"
election_description: >-
  13 ranked ballots, 4 candidates. Ben beats every rival head-to-head (the Condorcet /
  Copeland winner) and wins Ranked Robin 3-0 — even though Ada and Dan each have more
  first-choices. Tabulate with STARVote_LH_tabulation_engine/tools_adam/pref_voting_tabulation_engine/ranked_robin_report.py.
voting_method: RankedRobin   # = RCV-RR / Copeland — round-robin on a ranked ballot
num_winners: 1
options:
  show_matrix: true          # opt the on-screen report into the full pairwise matrix
                             # (the _tabulated mirror always shows it regardless)
# Ranked Robin / Copeland worked example. 13 ranked ballots, 4 candidates
# (Ada=left, Ben=center-left, Cara=center-right, Dan=right).
# Pairwise: Ben beats Ada 9-4, Cara 7-6, Dan 9-4 -> 3-0 round-robin.
#   Copeland (wins - losses): Ben +3, Cara +1, Ada -1, Dan -3  ->  RANKED ROBIN WINNER: Ben.
# Ben is the Condorcet winner.  Note: Ada and Dan each have MORE first-choices (4) than
# Ben (3) -- Ranked Robin elects the consensus center, not the plurality leader.
# The LH engine now tabulates Ranked Robin first-class: this file prints the
# round-robin (ballots + pairwise table + win-loss record). For an independent
# Copeland cross-check, run STARVote_LH_tabulation_engine/tools_adam/pref_voting_tabulation_engine/ranked_robin_report.py.
# Lesson: 00_start_here/RCV_Ranked_Robin/ranked_robin.md
ballots: |-
  4:Ada>Ben>Cara>Dan
  4:Dan>Cara>Ben>Ada
  3:Ben>Cara>Ada>Dan
  2:Cara>Ben>Dan>Ada

expected_winners:
  - Ben

# file: ranked_robin_consensus_center.yaml
