election_title: "BV2143 — Ranked Robin clone independence (2/2): teaming succeeds on LH, FAILS on BV"
election_description: >-
  The electowiki clone-independence example, part 2 (teaming), BV-backed. Same
  election as BV2142 but the A-faction runs clones A1, A2. The two engines reach
  OPPOSITE winners from identical ballots: A1 and C tie at 5 wins. LH breaks it by
  total margin — A1 +134 beats C +104 — so LH elects A1, and the teaming attack
  SUCCEEDS (this file pins lot but margin already decides). BetterVoting breaks the
  2-way tie by head-to-head instead, and C beats A1 21-12, so BV elects C
  (tieBreakType "none", log "C preferred over A1 in runoff") — the teaming attack
  FAILS on BV. Same ballots, different tiebreak, different winner: the clone
  failure is a property of the margin rule, not of Ranked Robin as such. LH-only
  clean pair: clone_teaming_02_post.yaml. Lesson:
  00_start_here/RCV_Ranked_Robin/rr_clone_independence.md
  Live results: https://bettervoting.com/9pr3wr/results
bv_test_id: BV2143
bv_election_id: 9pr3wr
bv_results_url: https://bettervoting.com/9pr3wr/results
paradoxes: [clone-teaming]
voting_method: RankedRobin
num_winners: 1
lot_numbers: [A1, A2, B, C, D, E, F]
options:
  show_matrix: true
  matrix_finalists_only: false
# A1 & C tie at 5 wins. LH: margin A1 +134 > C +104 -> A1 (teaming succeeds).
#   BV: 2-way head-to-head, C beats A1 21-12 -> C (teaming fails). Deterministic
#   on BOTH engines, opposite winners.
ballots: |-
  12:A1>A2>B>C>D>E>F
  11:B>C>A1>A2>D>E>F
  10:C>A1>A2>B>D>E>F

expected_winners:
  - A1

