election_title: "Bloc STAR Voting: 2-Seat Committee Election"
scenario_description: |-
  A basic multi-winner example with 4 candidates and 2 seats. It demonstrates how
  Bloc STAR fills each seat sequentially through a dedicated scoring round and
  automatic runoff.

# Presenter notes (ignored by the engine; not shown to the audience).
video_script: |-
  SAY: "Sometimes we fill several seats, not one - a committee, a board. The
       simplest multi-winner method is Bloc STAR: just run single-winner STAR
       once per seat. Watch the rounds repeat."
  HOW: Point out the 'Round 1' / 'Round 2' separators - each seat is its own
       full scoring + runoff.
  WHY: Bridge from single-winner: Bloc STAR is literally 'STAR, repeated'. Easy
       to grasp, and the baseline the proportional methods improve on.
  POINT OUT: Bloc STAR is majoritarian - a cohesive majority can win EVERY seat.
       That's the limitation the next examples fix.
  TRANSITION: "Bloc STAR lets a majority sweep all the seats. What if we want a
       minority to earn fair representation? That's proportional STAR - next."

options:
  show_description: false   # clean demo: description stays in the file (+_tabulated), hidden on screen
  show_matrix: false
  matrix_finalists_only: false
  show_condorcet: false
  show_score_counts: false
  show_irv: false   # show the [Divergence from STAR] RCV-IRV comparison
  brief: true   # true = collapse repetitive "[STAR Voting: ...]" headers
  collapse_ballots: true   # true = group identical ballots as "count <sep> scores"
  count_separator: "×"   # collapsed-count separator: ×, :, or x/X

num_winners: 2
voting_method: Bloc STAR
ballots: |-
  Ann,Bob,Cal,Don
  1,  0,  4,  5
  1,  2,  4,  5

expected_winners:
  - Don
  - Cal

