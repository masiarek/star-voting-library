election_title: "Bloc STAR Voting: 2-Seat Committee Election"
scenario_description: |-
  A basic multi-winner example with 4 candidates and 2 seats. It demonstrates how
  Bloc STAR fills each seat sequentially through a dedicated scoring round and
  automatic runoff.

options:
  show_description: false   # clean demo: description stays in the file (+_tabulated), hidden on screen
  show_matrix: false
  matrix_finalists_only: false
  show_condorcet: false
  show_score_counts: false
  show_irv: false   # show the [Divergence from STAR] RCV-IRV comparison
  brief: true   # true = collapse repetitive "[STAR Voting: ...]" headers
  collapse_ballots: true   # true = group identical ballots as "count <sep> scores"
  count_separator: "×"   # collapsed-count separator: ×, :, or x/X

num_winners: 2
voting_method: Bloc STAR
ballots: |-
  Ann,Bob,Cal,Don
  1,  0,  4,  5
  1,  2,  4,  5

expected_winners:
  - Don
  - Cal

