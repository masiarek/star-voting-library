election_title: "BV130 — 6 candidates / 3 winners, Bloc STAR (dead-rung lot tie)"

scenario_description: |-
  The LH reference for BetterVoting test BV130 (real election 9ff9jk, "Bloc
  STAR", 3 seats). Six candidates (Ada, Ben, Cara, Dan, Eve, Finn), 4 ballots,
  and — deliberately — no candidate ever scores a 5 (the whole election is
  capped at 4).

  Seat 1 is a perfect Ada/Dan tie that survives EVERY deterministic rung: both
  total 15, pairwise 1-1 (2 Equal Support), and — because nothing reaches 5 —
  five-star is 0-0 (the "dead rung"). Only the LOT can separate them.

  BetterVoting broke it with a random draw whose perm was
  [Finn, Ben, Dan, Eve, Ada, Cara] — Dan ahead of Ada — so BV elected
  Dan (seat 1), Ada (seat 2), Eve (seat 3). Pinning lot_numbers to that perm
  reproduces BV exactly. A PUBLISHED order [Ada, Ben, Cara, Dan, Eve, Finn]
  would instead elect Ada (seat 1), Dan (seat 2), Eve (seat 3): same three
  winners, but the tied pair's seats swap. The result is therefore
  non-reproducible (cf. #1063 / #1417), and BV's top-level tieBreakType is
  reported as "none" even though a seat was decided by the lot.

options:
  show_description: false
  show_matrix: false
  matrix_finalists_only: false
  show_condorcet: false
  show_score_counts: true
  show_irv: false
  show_runoff_percent: true
  brief: true
  collapse_ballots: false
  count_separator: "×"

num_winners: 3
voting_method: Bloc STAR
lot_numbers: [Finn, Ben, Dan, Eve, Ada, Cara]   # BV's drawn order (perm) — reproduces Dan, Ada, Eve
ballots: |-
  Ada,Ben,Cara,Dan,Eve,Finn
  4,1,2,3,2,0
  3,2,1,4,2,1
  4,2,1,4,3,2
  4,2,1,4,3,1

expected_winners:
  - Dan
  - Ada
  - Eve

