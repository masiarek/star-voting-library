  3,0,1,1,1
  3,0,1,1,1
  3,0,1,1,1
  3,0,1,1,1
  3,0,1,1,1
  0,4,0,0,0
  0,4,0,0,0
  0,4,0,0,0
  0,4,0,0,0
  0,4,0,0,0
  0,1,3,2,1
  0,1,3,2,1
  0,2,5,4,3

expected_winners:
  - First
  - Second
  - Third
  - Fourth

