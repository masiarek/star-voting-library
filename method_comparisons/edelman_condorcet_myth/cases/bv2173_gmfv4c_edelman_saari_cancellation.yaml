  30:5,2,0   # Ada > Ben > Cara
  1:5,0,2    # Ada > Cara > Ben
  29:2,5,0   # Ben > Ada > Cara
  10:0,5,2   # Ben > Cara > Ada
  10:2,0,5   # Cara > Ada > Ben
  1:0,2,5    # Cara > Ben > Ada

expected_winners:
  - Ada

