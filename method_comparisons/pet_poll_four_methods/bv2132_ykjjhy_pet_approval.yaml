election_title: "BV2132 — Pet poll (Approval): broad support elects Cat"
election_description: >-
  One of the four races in the BV2132 "Pet poll" (BetterVoting election ykjjhy).
  This is the Approval race: each voter approves any number of pets (1 = approve).
  Cat is approved by everyone except the pure Dog bloc — 22 approvals — so Approval
  elects Cat, the broadly-acceptable consensus candidate (and Condorcet winner).
  Same electorate as the Plurality race (Dog wins) and the RCV-IRV race (Fish wins).
  BV also elects Cat.
  Live results: https://bettervoting.com/ykjjhy/results
