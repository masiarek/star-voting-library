election_title: Monotonicity — STAR counterpart (BEFORE — X wins)
scenario_description: |-
  The SAME 34-voter profile as the RCV-IRV monotonicity demo
  (01_Single_winner/monotonicity_irv_before.yaml), translated to 0–5 scores
  (1st → 5, 2nd → 3, unranked → 0). STAR elects X.

  In the _after file, 4 voters RAISE X to the top. RCV-IRV flips X from winner to
  loser (the non-monotonicity paradox); STAR still elects X. See
  00_start_here/monotonicity.md.

options:
  show_description: false
  show_matrix: true
  matrix_finalists_only: true
  show_condorcet: false
  show_score_counts: false
  show_irv: false   # show the [Divergence from STAR] RCV-IRV comparison
  brief: true
  collapse_ballots: true
  count_separator: "×"

paradoxes: [non-monotonicity]
voting_method: STAR
num_winners: 1

ballots: |-
  Count:X,Y,Z
  12:5,3,0   # X>Y
  12:0,5,3   # Y>Z
  10:3,0,5   # Z>X

expected_winners:
  - X

# file: monotonicity_star_before.yaml
