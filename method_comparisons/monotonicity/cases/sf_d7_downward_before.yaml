  2500:Melgar>Engardio>Nguyen
  3500:Melgar>Nguyen>Engardio
  5652:Melgar
  6909:Nguyen>Melgar>Engardio
  2251:Nguyen>Engardio>Melgar
  1695:Nguyen

expected_winners:
