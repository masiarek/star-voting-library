# Same 100-voter structure as the matched file, first-choice split shifted to
# 56/12/32. Liberal holds a first-choice majority, hence is the Condorcet
# winner by definition.
ballots: |-
  Count:Liberal,Moderate,Conservative
  56:5,2,0   # Liberal > Moderate > Conservative
  32:0,2,5   # Conservative > Moderate > Liberal
  6:2,5,0    # Moderate > Liberal > Conservative
  6:0,5,2    # Moderate > Conservative > Liberal

expected_winners:
  - Liberal

